server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Поддержка MIME-типов (важно для JS/CSS)
    include /etc/nginx/mime.types;
    types {
        application/javascript js;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Явный путь для статики Expo
    location /_expo/ {
        expires 1y;
        add_header Cache-Control "public";
        access_log off;
        # Если файл не найден, не перенаправлять на index.html
        try_files $uri =404;
    }
}
